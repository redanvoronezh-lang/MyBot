<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LapiGift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #05060e;
            --card-bg: #0d0f1a;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-gray: #7e839f;
            --border-color: #1c1f2e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Контейнер приложения */
        .app-container { padding: 16px; padding-bottom: 90px; }

        /* Шапка с балансом */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .add-funds { color: var(--accent-blue); font-size: 20px; padding-left: 5px; cursor: pointer; }

        /* Карточка профиля */
        .user-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        #user-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 2px solid var(--accent-blue);
            margin-bottom: 12px;
            background: #222;
        }

        .user-name { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

        .btn-support {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            width: 100%;
            font-size: 15px;
            font-weight: 600;
        }

        /* Секции (Промокод, Инвентарь) */
        .section-block {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title { color: var(--text-gray); font-size: 13px; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }

        .promo-input-group { display: flex; gap: 8px; }
        input {
            flex: 1;
            background: #05060e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            outline: none;
        }

        .btn-ok { background: #22c55e; border: none; color: white; padding: 0 16px; border-radius: 12px; font-weight: bold; }

        /* Сетка кейсов */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .case-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .case-card img { width: 100%; height: auto; border-radius: 12px; margin-bottom: 8px; }
        .case-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .case-price { color: #f59e0b; font-weight: 700; font-size: 13px; }

        /* Нижнее меню */
        .nav-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(13, 15, 26, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 30px 0;
            border-top: 1px solid var(--border-color);
        }

        .nav-item { color: var(--text-gray); text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        .screen { display: none; }
        .active-screen { display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <div id="top-username" style="font-weight: 600; font-size: 15px;">...</div>
            <div class="balance-box">
                💎 <span>0.00</span>
                <span class="add-funds" onclick="showScreen('deposit')">+</span>
            </div>
        </div>

        <div id="profile-screen" class="screen active-screen">
            <div class="user-card">
                <img id="user-avatar" src="" alt="">
                <div class="user-name" id="full-name">Загрузка...</div>
                <button class="btn-support" onclick="tg.openTelegramLink('https://t.me/lapigift_sup_bot')">📩 Поддержка</button>
            </div>

            <div class="section-block">
                <div class="section-title">Активировать промокод</div>
                <div class="promo-input-group">
                    <input type="text" placeholder="Введите промокод">
                    <button class="btn-ok">OK</button>
                </div>
            </div>

            <div class="section-block">
                <div class="section-title">Инвентарь</div>
                <div style="text-align: center; color: var(--text-gray); padding: 10px;">Пусто</div>
            </div>
        </div>

        <div id="cases-screen" class="screen">
            <div class="section-title">Доступные кейсы</div>
            <div class="case-grid">
                <div class="case-card">
                    <img src="https://via.placeholder.com/150x100/1c1f2e/fff?text=BICHUGAN" alt="">
                    <div class="case-name">BICHUGAN</div>
                    <div class="case-price">0.5 TON</div>
                </div>
                <div class="case-card">
                    <img src="https://via.placeholder.com/150x100/1c1f2e/fff?text=SPRING" alt="">
                    <div class="case-name">SPRING</div>
                    <div class="case-price">0.9 TON</div>
                </div>
                <div class="case-card">
                    <img src="https://via.placeholder.com/150x100/1c1f2e/fff?text=ELITE" alt="">
                    <div class="case-name">ELITE</div>
                    <div class="case-price">5.0 TON</div>
                </div>
                <div class="case-card">
                    <img src="https://via.placeholder.com/150x100/1c1f2e/fff?text=PROMO" alt="">
                    <div class="case-name">PROMO</div>
                    <div class="case-price">FREE</div>
                </div>
            </div>
        </div>

        <div id="deposit-screen" class="screen">
            <div class="section-title">Метод оплаты</div>
            <div class="section-block" onclick="alert('Адрес: UQA497cKZr3vw-Dkb7HY306QGcYCMBQ1NDTVAmzf0TBytOsV')">
                <div style="display:flex; justify-content:space-between;">
                    <span>💎 TON Coin</span>
                    <span style="color:var(--accent-blue)">Выбрать</span>
                </div>
            </div>
            <div class="section-block">
                <div style="display:flex; justify-content:space-between;">
                    <span>⭐ Stars</span>
                    <span style="color:var(--text-gray)">21 день заморозка</span>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-menu">
        <div class="nav-item" onclick="showScreen('cases')">
            <span class="nav-icon">🎮</span> Кейсы
        </div>
        <div class="nav-item" onclick="showScreen('bonuses')">
            <span class="nav-icon">🎁</span> Бонусы
        </div>
        <div class="nav-item active" id="nav-profile" onclick="showScreen('profile')">
            <span class="nav-icon">👤</span> Профиль
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#05060e";

        // Получаем данные юзера
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('top-username').innerText = user.first_name;
            document.getElementById('full-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            if (user.photo_url) {
                document.getElementById('user-avatar').src = user.photo_url;
            } else {
                document.getElementById('user-avatar').src = "https://ui-avatars.com/api/?name=" + user.first_name + "&background=3b82f6&color=fff";
            }
        }

        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            if(name === 'profile') {
                document.getElementById('profile-screen').classList.add('active-screen');
                document.getElementById('nav-profile').classList.add('active');
            } else if(name === 'cases') {
                document.getElementById('cases-screen').classList.add('active-screen');
                document.querySelectorAll('.nav-item')[0].classList.add('active');
            } else if(name === 'deposit') {
                document.getElementById('deposit-screen').classList.add('active-screen');
            }
        }
    </script>
</body>
</html>
