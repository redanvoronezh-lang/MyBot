<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d0f14; --card: #1a1d24; --blue: #2c7ef7; --text: #fff; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 16px; text-align: center; }
        .avatar { width: 90px; height: 90px; border-radius: 25px; border: 2px solid var(--blue); margin-top: 10px; object-fit: cover; }
        .lvl { background: var(--blue); padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; display: inline-block; margin: 12px 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .card-label { font-size: 10px; color: var(--gray); margin-bottom: 5px; }
        .invite { background: var(--blue); padding: 20px; border-radius: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-top: 10px; }
        .plus { background: rgba(255,255,255,0.2); width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .drop-title { text-align: left; margin: 25px 0 10px; font-size: 12px; color: var(--gray); display: flex; align-items: center; gap: 5px; }
        .empty { background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.05); border-radius: 24px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); font-size: 13px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <img id="u_av" class="avatar" src="">
    <div id="u_nm" style="font-size: 22px; font-weight: 800; margin-top: 10px;">LOADING...</div>
    <div class="lvl">1 LEVEL</div>
    <div><span id="u_id" style="background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--gray);">ID: 0</span></div>
    
    <div class="stats">
        <div class="card" onclick="tg.showAlert('Партнерка: 5% с депов\nВывод от 500 STARS')">
            <div class="card-label">БАЛАНС</div>
            <div style="font-weight: bold;">1 ⭐</div>
        </div>
        <div class="card">
            <div class="card-label">РЕФЕРАЛЫ</div>
            <div style="font-weight: bold;">0 👤</div>
        </div>
    </div>

    <div class="invite" onclick="copyRef()">
        <div style="text-align: left;"><b style="font-size: 16px;">ПРИГЛАСИТЬ ДРУГА</b><br><small style="opacity: 0.8;">ПОЛУЧАЙТЕ БОНУСЫ ВМЕСТЕ!</small></div>
        <div class="plus">+</div>
    </div>

    <div class="drop-title">⚡ ЛУЧШИЙ ДРОП</div>
    <div class="empty">📦<br><br>ПОКА НЕТ ДРОПОВ</div>

    <div class="nav">
        <div style="color: var(--gray); font-size: 10px;">🏠<br>ГЛАВНАЯ</div>
        <div style="color: var(--gray); font-size: 10px;">🏆<br>КОНКУРСЫ</div>
        <div style="color: var(--blue); font-size: 10px;">👤<br>ПРОФИЛЬ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u_nm').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('u_id').innerText = 'ID: ' + user.id;
            document.getElementById('u_av').src = user.photo_url || '';
        }
        function copyRef() {
            const link = 'https://t.me/YOUR_BOT_USERNAME?start=' + user.id;
            navigator.clipboard.writeText(link);
            tg.showAlert('Ссылка скопирована!');
        }
        tg.expand();
    </script>
</body>
</html>
