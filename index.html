<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StarsCase</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основные стили и переменные (цвета в точности как на фото) */
        :root {
            --bg-color: #0b0e13; /* Глубокий черный фон */
            --card-bg: #16191f; /* Темно-серые блоки */
            --accent-blue: #2c7ef7; /* Ярко-синий для кнопок */
            --text-main: #ffffff; /* Белый текст */
            --text-gray: #7d848f; /* Серый текст для подписей */
        }

        /* Обнуление отступов и базовая настройка */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            padding-bottom: 90px; /* Отступ под навигацию */
            overflow-x: hidden;
            -webkit-user-select: none; user-select: none; /* Запрет выделения текста */
        }

        /* --- Блок Профиля --- */
        .header { text-align: center; margin-top: 15px; position: relative; }
        
        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto;
        }
        
        #avatar {
            width: 100%;
            height: 100%;
            border-radius: 26px; /* Закругление как на фото */
            border: 2px solid #1a202c; /* Темный ободок */
            object-fit: cover;
            background-color: #1a1d24; /* Фон пока грузится */
        }

        /* Кнопки настроек и помощи по бокам аватарки */
        .icon-btn {
            position: absolute;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            font-size: 18px;
            cursor: pointer;
        }
        .icon-settings { left: -50px; top: 50%; transform: translateY(-50%); }
        .icon-help { right: -50px; top: 50%; transform: translateY(-50%); }

        /* Имя и Уровень */
        #username {
            font-size: 24px;
            font-weight: 800;
            margin: 15px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .level-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .level-badge {
            background: var(--accent-blue);
            color: #fff;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .xp-text { color: var(--text-gray); font-size: 11px; }

        /* Полоска прогресса (под уровнем) */
        .progress-bar {
            width: 160px;
            height: 3px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin: 0 auto 15px;
            position: relative;
        }
        .progress-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            width: 15%; /* Прогресс (например, 15/50 XP) */
            background: var(--accent-blue);
            border-radius: 2px;
        }

        /* ID пользователя */
        #user
