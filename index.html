<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #2f81f7; --text: #ffffff; --gray: #8b949e; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .avatar { width: 80px; height: 80px; border-radius: 20px; border: 2px solid var(--blue); margin-top: 10px; }
        .lvl { background: var(--blue); padding: 2px 10px; border-radius: 5px; font-size: 12px; display: inline-block; margin: 10px 0; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; }
        .invite { background: var(--blue); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .drop { background: rgba(255,255,255,0.05); border: 1px dashed var(--gray); border-radius: 20px; height: 100px; margin-top: 10px; display: flex; align-items: center; justify-content: center; color: var(--gray); }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--card); }
    </style>
</head>
<body>
    <img id="u_av" class="avatar">
    <div id="u_nm" style="font-weight: bold; margin-top: 5px;">User</div>
    <div class="lvl">1 LEVEL</div>
    <div id="u_id" style="color: var(--gray); font-size: 12px;">ID: 0</div>
    <div class="stats">
        <div class="card" onclick="alert('Вывод от 500 STARS')">БАЛАНС<br>1 ⭐</div>
        <div class="card">РЕФЕРАЛЫ<br>0 👤</div>
    </div>
    <div class="invite" onclick="copyRef()">
        <div style="text-align: left;"><b>ПРИГЛАСИТЬ ДРУГА</b><br><small>Бонус 5% с депов</small></div>
        <div style="font-size: 20px;">+</div>
    </div>
    <div style="text-align: left; margin-top: 20px; font-size: 12px; color: var(--gray);">⚡ ЛУЧШИЙ ДРОП</div>
    <div class="drop">ПОКА НЕТ ДРОПОВ</div>
    <div class="nav"><span>🏠</span><span>🏆</span><span style="color: var(--blue);">👤</span></div>
    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        if(user) {
            document.getElementById('u_nm').innerText = user.first_name;
            document.getElementById('u_id').innerText = 'ID: ' + user.id;
            document.getElementById('u_av').src = user.photo_url || 'https://via.placeholder.com/80';
        }
        function copyRef() {
            navigator.clipboard.writeText('https://t.me/ТВОЙ_БОТ?start=' + user.id);
            tg.showAlert('Ссылка скопирована!');
        }
        tg.expand();
    </script>
</body>
</html>
